name: 'Validate Maintainers'
description: 'Validate a maintainers.yaml file against the CNCF .project schema'
inputs:
  maintainers_file:
    description: 'Path to the maintainers.yaml file to validate'
    required: true
  base_maintainers_file:
    description: 'Path to the base maintainers file for diff validation (optional)'
    required: false
    default: ''
  verify_maintainers:
    description: 'Verify maintainer handles against LFX (requires LFX_AUTH_TOKEN secret)'
    required: false
    default: 'false'
  go_version:
    description: 'DEPRECATED: no longer used. Version is read from utilities/dot-project/go.mod'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Checkout automation tools
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        repository: cncf/automation
        path: _cncf-automation
        sparse-checkout: utilities/dot-project

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: _cncf-automation/utilities/dot-project/go.mod

    - name: Build validator
      shell: bash
      env:
        WORKSPACE: ${{ github.workspace }}
      run: |
        cd _cncf-automation/utilities/dot-project
        go build -o "${WORKSPACE}/_cncf-validator" ./cmd/validator

    - name: Validate maintainers
      shell: bash
      env:
        WORKSPACE: ${{ github.workspace }}
        MAINTAINERS_FILE: ${{ inputs.maintainers_file }}
        BASE_MAINTAINERS_FILE: ${{ inputs.base_maintainers_file }}
        VERIFY_MAINTAINERS: ${{ inputs.verify_maintainers }}
      run: |
        ARGS="-config /dev/null -maintainers ${MAINTAINERS_FILE}"
        if [ -n "${BASE_MAINTAINERS_FILE}" ]; then
          ARGS="$ARGS -base-maintainers ${BASE_MAINTAINERS_FILE}"
        fi
        if [ "${VERIFY_MAINTAINERS}" = "true" ]; then
          ARGS="$ARGS -verify-maintainers"
        fi
        "${WORKSPACE}/_cncf-validator" $ARGS

    - name: Cleanup
      shell: bash
      if: always()
      run: |
        rm -rf _cncf-automation _cncf-validator
