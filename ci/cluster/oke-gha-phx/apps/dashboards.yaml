apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
    argocd.argoproj.io/sync-wave: "10"
    notifications.argoproj.io/subscribe.slack: internal-gha-argo
  labels:
    cluster: oke-gha-phx
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    path: ci/cluster/oke-gha-phx/manifests/dashboards
    repoURL: https://github.com/cncf/automation
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 1
      backoff:
        duration: 5s 
        factor: 2 
        maxDuration: 1m
